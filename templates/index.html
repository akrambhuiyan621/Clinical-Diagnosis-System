<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinical Notes Disease Prediction</title>
</head>
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f0f0f0;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }
    .container {
        background-color: #fff;
        border-radius: 8px;
        padding: 20px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        width: 480px;
        text-align: center;
    }
    h1 { color: #333; font-size: 22px; }
    input[type="file"] {
        margin: 20px 0;
        display: block;
        width: 100%;
        padding: 10px;
        border-radius: 5px;
        box-sizing: border-box;
    }
    button {
        background-color: #4CAF50;
        color: white;
        padding: 12px 20px;
        border: none;
        cursor: pointer;
        width: 100%;
        font-size: 16px;
        border-radius: 5px;
    }
    button:hover { background-color: #45a049; }
    .spinner {
        margin: 20px auto;
        border: 4px solid #f3f3f3;
        border-top: 4px solid #3498db;
        border-radius: 50%;
        width: 50px;
        height: 50px;
        animation: spin 1s linear infinite;
    }
    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
    .result { margin-top: 20px; font-size: 16px; color: #333; }
    table { width: 100%; border-collapse: collapse; }
    td { padding: 10px 8px; vertical-align: top; border-bottom: 1px solid #ddd; }
    td:first-child { font-weight: bold; white-space: nowrap; width: 40%; }
    .error { color: red; }
</style>
<body>
    <div class="container">
        <h1>Clinical Notes Disease Prediction</h1>
        <form id="uploadForm">
            <input type="file" name="file" accept=".txt,.pdf" required>
            <button type="submit" id="submit-btn">Predict Disease</button>
        </form>
        <div id="spinner" class="spinner" style="display:none;"></div>
        <div id="result" class="result" style="display:none;"></div>
    </div>

    <script>
        const form = document.getElementById("uploadForm");
        const spinner = document.getElementById("spinner");
        const resultDiv = document.getElementById("result");

        form.onsubmit = async (event) => {
            event.preventDefault();
            spinner.style.display = "block";
            resultDiv.style.display = "none";
            resultDiv.innerHTML = "";

            try {
                const formData = new FormData(form);
                const response = await fetch('/predict/', {
                    method: 'POST',
                    body: formData,
                });

                const data = await response.json();
                spinner.style.display = "none";

                if (!response.ok || data.error) {
                    throw new Error(data.error || "Prediction failed.");
                }

                const medicinesList = data.medicines.length
                    ? data.medicines.join(", ")
                    : "Not available";
                const specialistsList = data.specialists.length
                    ? data.specialists.join(", ")
                    : "Not available";

                resultDiv.innerHTML = `
                    <h3 style="text-align:center; color:#333;">Patient Clinical Report</h3>
                    <div style="border:1px solid #ccc; padding:15px; border-radius:8px; background:#fafafa;">
                        <table>
                            <tr>
                                <td>Predicted Disease:</td>
                                <td>${data.predicted_disease}</td>
                            </tr>
                            <tr>
                                <td>Description:</td>
                                <td>${data.description}</td>
                            </tr>
                            <tr>
                                <td>Recommended Medicines:</td>
                                <td>${medicinesList}</td>
                            </tr>
                            <tr>
                                <td>Specialists:</td>
                                <td>${specialistsList}</td>
                            </tr>
                        </table>
                    </div>
                `;
                resultDiv.style.display = "block";

            } catch (error) {
                spinner.style.display = "none";
                resultDiv.innerHTML = `<p class="error">Error: ${error.message}</p>`;
                resultDiv.style.display = "block";
            }
        };
    </script>
</body>
</html>
